<svg width="1200" height="300" viewBox="0 0 1200 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Raghav Gangwar">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="300" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0a0e16"/>
      <stop offset="0.55" stop-color="#0d1220"/>
      <stop offset="1" stop-color="#090b12"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#1a2a4a" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#0a0e16" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="300" fill="url(#bg)"/>
  <ellipse cx="600" cy="170" rx="520" ry="200" fill="url(#glow)"/>

  <!-- constellation lines -->
  <g stroke="#2b3a5c" stroke-width="1" opacity="0.5">
    <line x1="250" y1="90"  x2="370" y2="150"/>
    <line x1="370" y1="150" x2="300" y2="230"/>
    <line x1="370" y1="150" x2="500" y2="120"/>
    <line x1="820" y1="100" x2="930" y2="160"/>
    <line x1="930" y1="160" x2="880" y2="240"/>
    <line x1="930" y1="160" x2="1010" y2="110"/>
  </g>

  <!-- stars -->
  <g fill="#cdd9ff">
    <circle cx="250" cy="90"  r="2.2" opacity="0.9"/>
    <circle cx="370" cy="150" r="2.6" opacity="1"/>
    <circle cx="300" cy="230" r="1.8" opacity="0.7"/>
    <circle cx="500" cy="120" r="2" opacity="0.8"/>
    <circle cx="820" cy="100" r="2" opacity="0.8"/>
    <circle cx="930" cy="160" r="2.6" opacity="1"/>
    <circle cx="880" cy="240" r="1.8" opacity="0.7"/>
    <circle cx="1010" cy="110" r="2.2" opacity="0.9"/>
  </g>
  <g fill="#7f8db0">
    <circle cx="150" cy="60"  r="1.3"/>
    <circle cx="420" cy="60"  r="1"/>
    <circle cx="680" cy="50"  r="1.4"/>
    <circle cx="1080" cy="220" r="1.2"/>
    <circle cx="120" cy="200" r="1.1"/>
    <circle cx="560" cy="260" r="1"/>
    <circle cx="720" cy="230" r="1.3"/>
    <circle cx="990" cy="60"  r="1.1"/>
    <circle cx="200" cy="150" r="1"/>
    <circle cx="640" cy="190" r="1.2"/>
  </g>

  <!-- name -->
  <text x="600" y="160" text-anchor="middle"
        font-family="'JetBrains Mono','Courier New',monospace"
        font-size="64" font-weight="700"
        letter-spacing="2" fill="#e8edff">Raghav Gangwar</text>

  <!-- tagline -->
  <text x="600" y="205" text-anchor="middle"
        font-family="'JetBrains Mono','Courier New',monospace"
        font-size="20" font-weight="400"
        letter-spacing="3" fill="#7f8db0">I build things that ship.</text>
</svg>
